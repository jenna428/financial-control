<div class="d-flex flex-column">
    <app-fixed-transaction-form
        action="create"
        [category]="category"
        [title]="title"
        (onSubmit)="load()"
        class="row">
    </app-fixed-transaction-form>

    <div class="mx-auto w-75">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
            <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef> Data </th>
            <td mat-cell *matCellDef="let element"> {{element.transactionDate | date: 'dd-MM-yyyy'}} </td>
            </ng-container>
            <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>
        
            <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef> Valor </th>
            <td mat-cell *matCellDef="let element">
                <div class="d-flex align-items-center">
                    {{element.amount | currency}}
                    <div class="d-flex ms-auto">
                        <button type="button" class="btn btn-light d-flex justify-content-center align-items-center m-2 p-2" (click)="openUpdateDialog(element)">
                            <span class="material-symbols-outlined">
                                edit
                            </span>
                        </button>
                        <button type="button" class="btn btn-light d-flex justify-content-center align-items-center m-2 p-2" (click)="isActive(element.id)">
                            <span class="material-symbols-outlined">
                                archive
                            </span>
                        </button>
                    </div>
                </div>
            </td>
            </ng-container>
        
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
