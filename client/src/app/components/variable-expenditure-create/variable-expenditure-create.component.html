<div class="d-flex flex-column">
    <app-variable-expenditure-form
    action="create" (onSubmit)="load()"></app-variable-expenditure-form>

    <div class="table d-flex justify-content-center">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
            <!-- Name Column -->
            <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let element">
                <div class="d-flex align-items-center">
                    {{element.name}}
                    <div class="d-flex ms-auto">
                        <button type="button" class="btn btn-light d-flex justify-content-center align-items-center m-2 p-2" (click)="openUpdateDialog(element)">
                            <span class="material-symbols-outlined">
                                edit
                            </span>
                        </button>
                        <button type="button" class="btn btn-light d-flex justify-content-center align-items-center m-2 p-2" (click)="isActive(element.id)">
                            <span class="material-symbols-outlined">
                                archive
                            </span>
                        </button>
                    </div>
                </div>
            </td>
            </ng-container>
    
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
