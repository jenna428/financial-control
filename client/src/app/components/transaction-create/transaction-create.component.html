<div class="d-flex flex-column">
    <app-transaction-form (onSubmit)="load()" action="create"></app-transaction-form>
    <div class="table d-flex justify-content-center">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

                <ng-container matColumnDef="despesa">
                    <th mat-header-cell *matHeaderCellDef> Despesas </th>
                    <td mat-cell *matCellDef="let element"> {{element.expenditure.name}} </td>
                </ng-container>

                <ng-container matColumnDef="amount">
                    <th mat-header-cell *matHeaderCellDef> Valor </th>
                    <td mat-cell *matCellDef="let element"> {{element.amount}} </td>
                </ng-container>

                <ng-container matColumnDef="description">
                    <th mat-header-cell *matHeaderCellDef> Descrição </th>
                    <td mat-cell *matCellDef="let element"> {{element.description}} </td>
                </ng-container>

                <ng-container matColumnDef="data">
                <th mat-header-cell *matHeaderCellDef> Data </th>
                <td mat-cell *matCellDef="let element">
                    <div class="d-flex align-items-center">
                        {{element.transDate | date}}
                        <div class="d-flex ms-auto">
                            <button type="button" class="btn btn-light d-flex justify-content-center align-items-center m-2 p-2" (click)="openUpdateDialog(element)">
                                <span class="material-symbols-outlined">
                                    edit
                                </span>
                            </button>
                        </div>
                    </div>
                </td>
                </ng-container>
    
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
</div>
