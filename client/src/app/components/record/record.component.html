<div class="page d-flex flex-column">
    <div class="d-flex justify-content-center">
        <h1>
            Meses Anteriores
        </h1>
    </div>

    <div class="row m-5 p-5">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

            <ng-container matColumnDef="data">
            <th mat-header-cell *matHeaderCellDef> Data </th>
            <td mat-cell *matCellDef="let element"> {{element.date | date: 'MM-yyyy'}} </td>
            </ng-container>

            <ng-container matColumnDef="totI">
            <th mat-header-cell *matHeaderCellDef> T. Receitas </th>
            <td mat-cell *matCellDef="let element"> {{element.totalIncome}} </td>
            </ng-container>

            <ng-container matColumnDef="totE">
            <th mat-header-cell *matHeaderCellDef> T. Despesas </th>
            <td mat-cell *matCellDef="let element"> {{element.totalExpenditure}} </td>
            </ng-container>

            <ng-container matColumnDef="finalB">
            <th mat-header-cell *matHeaderCellDef> Saldo F. </th>
            <td mat-cell *matCellDef="let element">
                <div class="d-flex align-items-center">
                    {{element.finalBalance}}
                    <div class="d-flex ms-auto">
                        <button type="button" class="btn btn-light d-flex justify-content-center align-items-center m-2 p-2" (click)="openMonth(element)">
                            <span class="material-symbols-outlined">
                                arrow_forward
                            </span>
                        </button>
                    </div>
                </div>
            </td>
            </ng-container>
        
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
