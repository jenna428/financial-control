<div class="page d-flex flex-column">
    <div class="d-flex justify-content-center mb-5 pb-5">
        <h1>
            {{month | month}} / {{year}}
        </h1>
    </div>

    <div class="ms-5 ps-5 d-flex align-items-end">
        <form [formGroup]="formSearch" (ngSubmit)="submit()" class="formSearch" role="search">
            <div class="search d-flex rounded">
                <input class="border-0 m-2 col" formControlName="search" type="search" placeholder="Busca" aria-label="Search">
                <button class="border-0 bg-white rounded" type="submit">
                    <mat-icon class="material-symbols-outlined">
                        search
                    </mat-icon>
                </button>
            </div>
        </form>
        <div class="ms-2 d-flex gap-2">
            <button mat-flat-button color="primary" (click)="load()">Todos</button>
            <button mat-flat-button color="primary" (click)="loadIncomes()">Receitas</button>
            <button mat-flat-button color="primary" (click)="loadExpenditures()">Despesas</button>
            <div class="d-flex gap-2" *ngIf="category === Category.EXPENDITURE">
                <button mat-flat-button color="secondary" (click)="filterExpendituresByType(true)">Fixas</button>
                <button mat-flat-button color="secondary" (click)="filterExpendituresByType(false)">Variaveis</button>
            </div>
        </div>
    </div>

    <div class="row ms-5 me-5 p-5">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

            <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef> Data </th>
            <td mat-cell *matCellDef="let element"> {{element.transactionDate | date: 'dd-MM-yyyy'}} </td>
            </ng-container>

            <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>

            <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef> Categoria </th>
            <td mat-cell *matCellDef="let element"> {{element.category === Category.EXPENDITURE ? 'Despesa' : 'Receita'}} </td>
            </ng-container>

            <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef> Valor </th>
            <td mat-cell *matCellDef="let element"> {{element.amount}} </td>
            </ng-container>

            <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef> Tipo </th>
            <td mat-cell *matCellDef="let element"> {{element.isFixed ? 'Fixa' : 'Variável'}} </td>
            </ng-container>
        
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
