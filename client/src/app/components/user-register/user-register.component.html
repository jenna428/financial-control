<div class="d-flex justify-content-center align-items-center h-100">
    <mat-toolbar class="shadow position-absolute top-0">
        <button class="position-absolute start-2" mat-icon-button (click)="toLogin()">
                <span class="d-flex justify-content-center align-items-center material-symbols-outlined">
                arrow_back_ios
                </span>
            </button>
        <span class="mx-auto"><h1>Pecunia</h1></span>
    </mat-toolbar>
    <div class="p-5 rounded-3 shadow">
        <form [formGroup]="form" (ngSubmit)="submit()">
            <h1 class="d-flex justify-content-center mb-3">Cadastro</h1>
                <div>
                    <mat-form-field appearance="fill" class="w-100 mb-3">
                        <mat-label>Usuário</mat-label>
                        <input matInput formControlName="name">
                        <mat-error>{{getError(this.form.get('name')?.errors)}}</mat-error>
                    </mat-form-field>
                </div>
                <div>
                    <mat-form-field appearance="fill" class="w-100 mb-3">
                        <mat-label>Email</mat-label>
                        <input matInput formControlName="email">
                    </mat-form-field>
                </div>
                <div>
                    <mat-form-field appearance="fill" class="w-100 mb-3">
                        <mat-label>Senha</mat-label>
                        <input matInput formControlName="password" [type]="hide ? 'password' : 'text'">
                        <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                            <mat-icon class="d-flex align-items-center">{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                        </button>
                        <mat-error>{{getError(this.form.get('password')?.errors)}}</mat-error>
                    </mat-form-field>
                </div>
                <div>
                    <mat-form-field appearance="fill" class="w-100 mb-3">
                        <mat-label>Confirmar Senha</mat-label>
                        <input matInput formControlName="confirmPassword" [type]="hide ? 'password' : 'text'">
                        <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                            <mat-icon class="d-flex align-items-center">{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                        </button>
                        <mat-error>{{getError(this.form.get('confirmPassword')?.errors)}}</mat-error>
                    </mat-form-field>
                </div>
                <div>

                <button mat-flat-button class="register-button w-100" color="primary" type="submit" [disabled]="!isFormValid">Cadastrar</button>
            </div>
        </form>
    </div>
</div>
